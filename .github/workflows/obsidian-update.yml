name: Obsidian Auto-Update

# Keeps the self-hosted runner's pre-extracted Obsidian AppImage at the
# latest released version so E2E tests exercise up-to-date Obsidian.
on:
  schedule:
    # Mondays at 04:00 UTC (after Sunday runner-cleanup). Obsidian typically
    # ships a new version every 2-4 weeks, so weekly checks are enough.
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-download even if installed version matches"
        type: boolean
        default: false

jobs:
  update:
    runs-on: [self-hosted, engram]
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/update-obsidian.sh
          sparse-checkout-cone-mode: false

      - name: Update Obsidian to latest release
        run: |
          chmod +x .github/update-obsidian.sh
          if [ "${{ inputs.force }}" = "true" ]; then
            bash .github/update-obsidian.sh --force
          else
            bash .github/update-obsidian.sh
          fi

      - name: Show installed version
        run: |
          if [ -f "$HOME/Applications/.obsidian-version" ]; then
            echo "Installed Obsidian version: $(cat "$HOME/Applications/.obsidian-version")"
          else
            echo "No version file — install may have failed"
            exit 1
          fi
