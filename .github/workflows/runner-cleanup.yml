name: Runner Cleanup

on:
  schedule:
    # Every Sunday at 3am UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: [self-hosted, engram]
    steps:
      - name: Docker cleanup
        run: |
          echo "=== Before ==="
          docker system df

          # 1. Remove stopped containers + their volumes
          docker container prune -f 2>/dev/null || true

          # 2. Remove dangling volumes (anonymous volumes from dead containers)
          docker volume prune -f 2>/dev/null || true

          # 3. Remove dangling images (untagged layers)
          docker image prune -f 2>/dev/null || true

          # 4. Keep only latest 3 GHCR engram release tags
          docker images --format '{{.Repository}}:{{.Tag}}' \
            --filter "reference=ghcr.io/rasbandit/engram:*" \
            | grep -v ':latest$' \
            | tail -n +3 \
            | xargs -r docker rmi 2>/dev/null || true

          # 5. Keep only latest CI cache image
          docker images --format '{{.Repository}}:{{.Tag}}' \
            --filter "reference=engram-ci:*" \
            | tail -n +2 \
            | xargs -r docker rmi 2>/dev/null || true

          # 6. Remove stale per-run images that slipped through teardown (cancelled jobs)
          docker images --format '{{.Repository}}:{{.Tag}}' \
            --filter "reference=engram-ci-*-engram:latest" \
            | xargs -r docker rmi 2>/dev/null || true

          # 7. Prune build cache older than 7 days
          docker builder prune --filter until=168h -f 2>/dev/null || true

          echo "=== After ==="
          docker system df
