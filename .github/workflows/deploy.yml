name: Deploy

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, engram]
    environment: production
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            VERSION="${{ needs.build-and-push.outputs.version }}"
            REGISTRY="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
            NETWORK="${{ vars.DOCKER_NETWORK || 'ai' }}"

            # Pull new image
            docker pull "${REGISTRY}:${VERSION}"

            # Read secrets from existing env file
            JWT_SECRET=$(grep JWT_SECRET /opt/engram/.env | cut -d= -f2)
            SECRET_KEY_BASE=$(grep SECRET_KEY_BASE /opt/engram/.env | cut -d= -f2)
            VOYAGE_API_KEY=$(grep VOYAGE_API_KEY /opt/engram/.env | cut -d= -f2)

            # Replace engram container
            docker stop engram 2>/dev/null || true
            docker rm engram 2>/dev/null || true
            docker run -d \
              --name engram \
              --network "${NETWORK}" \
              -p 8000:4000 \
              --log-opt max-size=50m --log-opt max-file=1 \
              --restart unless-stopped \
              --label net.unraid.docker.managed=dockerman \
              --label 'net.unraid.docker.webui=http://[IP]:[PORT:8000]/' \
              -e TZ=America/Los_Angeles \
              -e PHX_SERVER=true \
              -e 'DATABASE_URL=postgresql://engram:engram@engram-postgres:5432/engram' \
              -e "JWT_SECRET=${JWT_SECRET}" \
              -e "SECRET_KEY_BASE=${SECRET_KEY_BASE}" \
              -e EMBED_BACKEND=voyage \
              -e DOC_EMBED_MODEL=voyage-4-large \
              -e QUERY_EMBED_MODEL=voyage-4-lite \
              -e "VOYAGE_API_KEY=${VOYAGE_API_KEY}" \
              -e 'QDRANT_URL=http://10.0.20.201:6333' \
              -e QDRANT_COLLECTION=obsidian_notes \
              -e PHX_HOST=engram.ax \
              -e PHX_SCHEME=http \
              -e PHX_PORT=80 \
              -e 'CLERK_JWKS_URL=https://rare-kingfish-16.clerk.accounts.dev/.well-known/jwks.json' \
              -e 'CLERK_ISSUER=https://rare-kingfish-16.clerk.accounts.dev' \
              "${REGISTRY}:${VERSION}"

            # Update version in remote .env
            sed -i "s/^VERSION=.*/VERSION=${VERSION}/" /opt/engram/.env

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sleep 3
            if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "engram is healthy"
            else
              echo "Health check failed!"
              docker logs engram --tail 20
              exit 1
            fi
