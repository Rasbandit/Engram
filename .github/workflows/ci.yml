name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [plugin-e2e-trigger]
  workflow_dispatch:

# Fixed group — CI stack uses fixed ports, only one run at a time regardless of branch
concurrency:
  group: ci-engram-stack
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"

jobs:
  ci:
    runs-on: [self-hosted, engram]

    steps:
      # ------------------------------------------------------------------
      # Cleanup + checkout
      # ------------------------------------------------------------------
      - name: Pre-cleanup stale resources
        run: |
          docker compose -f docker-compose.ci.yml -p engram-ci down -v --remove-orphans 2>/dev/null || true
          docker rm -f engram-test-db 2>/dev/null || true
          pkill -9 -f "e2e-obsidian-config" 2>/dev/null || true
          pkill -9 Xvfb 2>/dev/null || true
          rm -rf /tmp/e2e-vault-* /tmp/e2e-obsidian-config-*

      - uses: actions/checkout@v6

      # ------------------------------------------------------------------
      # Unit tests (Elixir + E2E helpers) — run while Docker builds
      # ------------------------------------------------------------------
      - name: Start test database
        run: |
          docker run -d --name engram-test-db \
            -e POSTGRES_USER=engram \
            -e POSTGRES_PASSWORD=engram \
            -e POSTGRES_DB=engram_test \
            -p 5432:5432 \
            --health-cmd "pg_isready -U engram" \
            --health-interval 3s \
            --health-timeout 3s \
            --health-retries 10 \
            postgres:16-alpine
          for i in $(seq 1 30); do
            if docker exec engram-test-db pg_isready -U engram > /dev/null 2>&1; then
              echo "Test DB ready"
              break
            fi
            sleep 1
          done

      - name: Build CI stack image (background)
        run: docker compose -f docker-compose.ci.yml -p engram-ci build &

      - name: Run Elixir unit tests
        run: |
          mix deps.get --only test
          MIX_ENV=test mix ecto.create
          MIX_ENV=test mix ecto.migrate
          mix test

      - name: Stop test database
        if: always()
        run: docker rm -f engram-test-db 2>/dev/null || true

      - name: Run E2E helper unit tests
        run: python3 -m pytest e2e/unit_tests/ -v

      # ------------------------------------------------------------------
      # Integration tests (test_plan.sh)
      # Skip on plugin dispatch (backend code didn't change)
      # ------------------------------------------------------------------
      - name: Start CI stack
        if: github.event_name != 'repository_dispatch'
        run: |
          docker compose -f docker-compose.ci.yml -p engram-ci up -d --build --wait
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8100/health > /dev/null 2>&1; then
              echo "engram is healthy"
              break
            fi
            sleep 1
          done

      - name: Run integration tests
        if: github.event_name != 'repository_dispatch'
        run: ENGRAM_TEST_URL=http://localhost:8100 bash test_plan.sh --skip-search

      # ------------------------------------------------------------------
      # E2E tests — full Obsidian sync cycle
      # Runs on every push. Restarts CI stack with fresh volumes.
      # ------------------------------------------------------------------
      - name: Reset CI stack for E2E (fresh database)
        run: |
          echo "Tearing down CI stack to clear integration test state..."
          docker compose -f docker-compose.ci.yml -p engram-ci down -v --remove-orphans 2>/dev/null || true
          rm -rf /tmp/e2e-vault-* /tmp/e2e-obsidian-config-*
          echo "Starting CI stack with fresh volumes..."
          docker compose -f docker-compose.ci.yml -p engram-ci up -d --build --wait
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8100/health > /dev/null 2>&1; then
              echo "engram is healthy"
              break
            fi
            sleep 1
          done

      - name: Checkout plugin
        uses: actions/checkout@v6
        with:
          repository: Rasbandit/Engram-obsidian-sync
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: plugin-src
          ref: ${{ github.event.client_payload.plugin_ref || 'main' }}

      - name: Build plugin
        working-directory: plugin-src
        run: npm ci && npm run build

      - name: Verify plugin build
        run: |
          for f in plugin-src/main.js plugin-src/manifest.json; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing $f — plugin build failed"
              exit 1
            fi
          done
          echo "Plugin build OK: $(ls -la plugin-src/main.js)"

      - name: Check Ollama reachability
        run: |
          if ! curl -sf http://10.0.20.214:11434/api/tags > /dev/null 2>&1; then
            echo "WARNING: Ollama on FastRaid not reachable — embedding tests may fail"
          else
            echo "Ollama OK"
          fi

      - name: Run E2E tests
        working-directory: e2e
        run: python3 -m pytest tests/ -v --timeout=300
        env:
          ENGRAM_API_URL: http://localhost:8100
          ENGRAM_PLUGIN_SRC: ${{ github.workspace }}/plugin-src
          CI_POSTGRES_CONTAINER: engram-ci-postgres-1

      # ------------------------------------------------------------------
      # Cleanup + artifacts
      # ------------------------------------------------------------------
      - name: Collect logs on failure
        if: failure()
        run: |
          mkdir -p ci-artifacts
          docker compose -f docker-compose.ci.yml -p engram-ci logs > ci-artifacts/docker-compose.log 2>&1
          for v in /tmp/e2e-vault-*; do
            if [ -d "$v" ]; then
              tar czf "ci-artifacts/$(basename $v).tar.gz" -C /tmp "$(basename $v)" 2>/dev/null || true
            fi
          done

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ci-debug-${{ github.sha }}
          path: ci-artifacts/
          retention-days: 7

      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.ci.yml -p engram-ci down -v --remove-orphans 2>/dev/null || true
          docker rm -f engram-test-db 2>/dev/null || true
          pkill -9 -f "e2e-obsidian-config" 2>/dev/null || true
          pkill -9 Xvfb 2>/dev/null || true
          rm -rf /tmp/e2e-vault-* /tmp/e2e-obsidian-config-*
