name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  repository_dispatch:
    types: [plugin-e2e-trigger]
  workflow_dispatch:

# Fixed group — CI stack uses fixed ports, only one run at a time regardless of branch
concurrency:
  group: ci-engram-stack
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"
  # LOCAL_REGISTRY is set by the runner environment after running .github/setup-runner.sh
  # When set, docker-compose.ci.yml pulls images from the local FastRaid registry.
  # When unset, falls back to Docker Hub.

jobs:
  ci:
    runs-on: [self-hosted, engram]

    steps:
      # ------------------------------------------------------------------
      # Cleanup + checkout
      # ------------------------------------------------------------------
      - name: Pre-cleanup stale resources
        run: |
          docker compose -f docker-compose.ci.yml -p engram-ci down -v --remove-orphans 2>/dev/null || true
          docker rm -f engram-test-db 2>/dev/null || true
          pkill -9 -f "e2e-obsidian-config" 2>/dev/null || true
          pkill -9 Xvfb 2>/dev/null || true
          rm -rf /tmp/e2e-vault-* /tmp/e2e-obsidian-config-*

      - uses: actions/checkout@v6
        with:
          clean: false  # Preserve _build/ and deps/ for incremental compilation

      # ------------------------------------------------------------------
      # Unit tests (Elixir + E2E helpers) — run while Docker builds
      # ------------------------------------------------------------------
      - name: Start test database
        run: |
          # Use local registry if configured, otherwise Docker Hub
          if [ -n "${LOCAL_REGISTRY:-}" ]; then
            PG_IMAGE="${LOCAL_REGISTRY}/postgres:16-alpine"
            docker pull "$PG_IMAGE" 2>/dev/null || PG_IMAGE="postgres:16-alpine"
          else
            PG_IMAGE="postgres:16-alpine"
          fi
          docker run -d --name engram-test-db \
            -e POSTGRES_USER=engram \
            -e POSTGRES_PASSWORD=engram \
            -e POSTGRES_DB=engram_test \
            -p 5434:5432 \
            --health-cmd "pg_isready -U engram" \
            --health-interval 3s \
            --health-timeout 3s \
            --health-retries 10 \
            "$PG_IMAGE"
          for i in $(seq 1 30); do
            if docker exec engram-test-db pg_isready -U engram > /dev/null 2>&1; then
              echo "Test DB ready"
              break
            fi
            sleep 1
          done

      - name: Build CI stack image (background)
        run: docker compose -f docker-compose.ci.yml -p engram-ci build &

      - name: Fetch Elixir deps (skip if unchanged)
        run: |
          if [ -d deps ] && [ -f deps/.mix_lock_hash ] && [ "$(md5sum mix.lock | cut -d' ' -f1)" = "$(cat deps/.mix_lock_hash)" ]; then
            echo "mix.lock unchanged — skipping deps.get"
          else
            mix deps.get --only test
            md5sum mix.lock | cut -d' ' -f1 > deps/.mix_lock_hash
          fi

      - name: Run Elixir unit tests
        env:
          DATABASE_URL: postgresql://engram:engram@localhost:5434/engram_test
        run: |
          MIX_ENV=test mix ecto.create
          MIX_ENV=test mix ecto.migrate
          mix test

      - name: Stop test database
        if: always()
        run: docker rm -f engram-test-db 2>/dev/null || true

      - name: Run E2E helper unit tests
        run: python3 -m pytest e2e/unit_tests/ -v

      # ------------------------------------------------------------------
      # Integration tests (test_plan.sh)
      # Skip on plugin dispatch (backend code didn't change)
      # ------------------------------------------------------------------
      - name: Start CI stack
        if: github.event_name != 'repository_dispatch'
        run: |
          docker compose -f docker-compose.ci.yml -p engram-ci up -d --build --wait
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8100/api/health > /dev/null 2>&1; then
              echo "engram is healthy"
              break
            fi
            sleep 1
          done
        env:
          CLERK_JWKS_URL: ${{ secrets.CLERK_JWKS_URL }}
          CLERK_ISSUER: ${{ secrets.CLERK_ISSUER }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Run integration tests
        if: github.event_name != 'repository_dispatch'
        run: ENGRAM_TEST_URL=http://localhost:8100/api ENGRAM_TEST_DB_URL=postgresql://engram:engram@localhost:5433/engram bash test_plan.sh --skip-search

      # ------------------------------------------------------------------
      # E2E tests — full Obsidian sync cycle
      # Runs on every push. Reuses CI stack, resets DB only.
      # ------------------------------------------------------------------
      - name: Reset database for E2E (reuse running stack)
        run: |
          rm -rf /tmp/e2e-vault-* /tmp/e2e-obsidian-config-*

          # If stack is already running from integration tests, just reset the DB
          if curl -sf http://localhost:8100/api/health > /dev/null 2>&1; then
            echo "CI stack is running — resetting database..."
            docker exec engram-ci-postgres-1 psql -U engram -d engram -c \
              "DO \$\$ DECLARE r RECORD;
               BEGIN
                 FOR r IN (SELECT tablename FROM pg_tables WHERE schemaname = 'public' AND tablename != 'schema_migrations')
                 LOOP EXECUTE 'TRUNCATE TABLE ' || quote_ident(r.tablename) || ' CASCADE'; END LOOP;
               END \$\$;"
            echo "Database reset — stack reused"
          else
            echo "CI stack not running — starting fresh..."
            docker compose -f docker-compose.ci.yml -p engram-ci up -d --build --wait
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8100/api/health > /dev/null 2>&1; then
                echo "engram is healthy"
                break
              fi
              sleep 1
            done
          fi
        env:
          CLERK_JWKS_URL: ${{ secrets.CLERK_JWKS_URL }}
          CLERK_ISSUER: ${{ secrets.CLERK_ISSUER }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Checkout plugin
        uses: actions/checkout@v6
        with:
          repository: Rasbandit/Engram-obsidian-sync
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: plugin-src
          ref: ${{ github.event.client_payload.plugin_ref || 'main' }}
          clean: false  # Preserve node_modules between runs

      - name: Build plugin
        working-directory: plugin-src
        run: npm ci && npm run build

      - name: Verify plugin build
        run: |
          for f in plugin-src/main.js plugin-src/manifest.json; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing $f — plugin build failed"
              exit 1
            fi
          done
          echo "Plugin build OK: $(ls -la plugin-src/main.js)"

      - name: Check Ollama reachability
        run: |
          if ! curl -sf http://10.0.20.214:11434/api/tags > /dev/null 2>&1; then
            echo "WARNING: Ollama on FastRaid not reachable — embedding tests may fail"
          else
            echo "Ollama OK"
          fi

      - name: Install Playwright (skip if pre-installed)
        run: |
          if python3 -c "from playwright.sync_api import sync_playwright" 2>/dev/null && \
             [ -d "$HOME/.cache/ms-playwright/chromium-"* ]; then
            echo "Playwright + Chromium already installed, skipping"
          else
            pip install 'playwright>=1.48'
            python3 -m playwright install chromium
          fi

      - name: Run E2E tests
        working-directory: e2e
        run: python3 -m pytest tests/ -v --timeout=300
        env:
          ENGRAM_API_URL: http://localhost:8100/api
          ENGRAM_PLUGIN_SRC: ${{ github.workspace }}/plugin-src
          CI_POSTGRES_CONTAINER: engram-ci-postgres-1
          E2E_CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}

      # ------------------------------------------------------------------
      # Cleanup — MUST kill everything, even on cancel/failure
      # ------------------------------------------------------------------
      - name: Collect logs on failure
        if: failure()
        run: |
          mkdir -p ci-artifacts
          docker compose -f docker-compose.ci.yml -p engram-ci logs > ci-artifacts/docker-compose.log 2>&1
          for v in /tmp/e2e-vault-*; do
            if [ -d "$v" ]; then
              tar czf "ci-artifacts/$(basename $v).tar.gz" -C /tmp "$(basename $v)" 2>/dev/null || true
            fi
          done

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ci-debug-${{ github.sha }}
          path: ci-artifacts/
          retention-days: 7

      - name: Tear down
        if: always()
        run: |
          # Kill ALL Obsidian processes (extracted binaries spawn children under /tmp)
          pkill -9 -f "e2e-obsidian-config" 2>/dev/null || true
          pkill -9 -f "appimage_extracted.*obsidian" 2>/dev/null || true
          pkill -9 Xvfb 2>/dev/null || true
          # Wait for processes to die before removing their dirs
          sleep 1
          # Remove e2e temp dirs
          rm -rf /tmp/e2e-vault-* /tmp/e2e-obsidian-config-*
          # Tear down Docker stack
          docker compose -f docker-compose.ci.yml -p engram-ci down -v --remove-orphans 2>/dev/null || true
          docker rm -f engram-test-db 2>/dev/null || true
          # Prune dangling images to reclaim disk (old CI builds)
          docker image prune -f 2>/dev/null || true
          # Clean up ci-artifacts from this run
          rm -rf ci-artifacts/
