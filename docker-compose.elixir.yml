services:
  engram_elixir:
    build: .
    env_file: .env.elixir
    environment:
      DATABASE_URL: postgresql://engram:engram@postgres:5432/engram
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
      POSTGRES_DB: engram
    ports:
      - "5433:5432"   # 5433 to avoid conflict with existing Python stack on 5432
    volumes:
      - pg_elixir_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg_elixir_data:
