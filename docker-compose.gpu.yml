# GPU override — adds NVIDIA GPU support to Ollama and enables Jina reranker.
#
# Usage:
#   docker compose -f docker-compose.full.yml -f docker-compose.gpu.yml up -d
#
# Requires: NVIDIA GPU + nvidia-container-toolkit installed on host.

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  jina-reranker:
    image: ${JINA_IMAGE:?Set JINA_IMAGE (e.g. ghcr.io/youruser/jina-reranker)}:latest
    ports:
      - "8082:8082"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
