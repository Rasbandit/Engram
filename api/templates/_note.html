{% if note %}
<article>
    <header>
        <h3>{{ note.title or 'Untitled' }}</h3>
        {% if note.tags %}
        <p>
            {% for tag in note.tags %}
            <mark>{{ tag }}</mark>
            {% endfor %}
        </p>
        {% endif %}
        <small>{{ note.path }}</small>
        <br>
        <a href="#" hx-get="/note/close" hx-target="#note-viewer">Close</a>
    </header>
    <section>{{ note.content | markdown }}</section>
</article>
{% else %}
<p>Note not found.</p>
{% endif %}
