{% extends "base.html" %}
{% block title %}Search - Engram{% endblock %}
{% block content %}
<h2>Search your vault</h2>

<form hx-get="/search/results" hx-target="#results" hx-indicator="#spinner">
    <div role="group">
        <input type="search" name="query" placeholder="Search your notes..." required autofocus>
        <button type="submit">Search</button>
    </div>
</form>

{% if tags %}
<details>
    <summary>Filter by tags</summary>
    <div id="tag-chips">
        {% for tag in tags %}
        <label>
            <input type="checkbox" name="tags" value="{{ tag.name }}" form="search-form">
            {{ tag.name }} ({{ tag.count }})
        </label>
        {% endfor %}
    </div>
</details>
{% endif %}

<div id="spinner" class="htmx-indicator" aria-busy="true">Searching...</div>
<div id="results"></div>
<div id="note-viewer"></div>
{% endblock %}
