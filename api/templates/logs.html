{% extends "base.html" %}
{% block title %}Logs — Engram{% endblock %}
{% block content %}
<h2>Client Logs</h2>
<p><small>Plugin errors and lifecycle events from all connected devices.</small></p>

<fieldset role="group">
    <select id="level-filter"
            hx-get="/logs/entries"
            hx-target="#log-body"
            hx-swap="innerHTML"
            hx-include="this"
            name="level">
        <option value="">All levels</option>
        <option value="error">Error</option>
        <option value="warn">Warn</option>
        <option value="info">Info</option>
    </select>
    <label>
        <input type="checkbox" id="auto-refresh" checked>
        Auto-refresh (10s)
    </label>
</fieldset>

<figure>
    <table role="grid">
        <thead>
            <tr>
                <th>Time</th>
                <th>Level</th>
                <th>Category</th>
                <th>Message</th>
                <th>Platform</th>
                <th>Version</th>
            </tr>
        </thead>
        <tbody id="log-body"
               hx-get="/logs/entries"
               hx-trigger="load, every 10s"
               hx-include="#level-filter"
               hx-swap="innerHTML">
        </tbody>
    </table>
</figure>

<script>
    const checkbox = document.getElementById('auto-refresh');
    const tbody = document.getElementById('log-body');
    checkbox.addEventListener('change', () => {
        if (checkbox.checked) {
            tbody.setAttribute('hx-trigger', 'load, every 10s');
        } else {
            tbody.setAttribute('hx-trigger', 'none');
        }
        htmx.process(tbody);
    });
</script>
{% endblock %}
