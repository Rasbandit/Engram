# Ephemeral CI test stack — all services local except Ollama (GPU on FastRaid).
#
# Always invoke with explicit project name for stable container names:
#   docker compose -f docker-compose.ci.yml -p engram-ci up -d --build --wait
#   ENGRAM_TEST_URL=http://localhost:8100 bash test_plan.sh
#   docker compose -f docker-compose.ci.yml -p engram-ci down -v --remove-orphans
#
# Container names: engram-ci-engram-1, engram-ci-postgres-1, etc.
#
# Ports offset from defaults to avoid collisions with local dev:
#   engram   8100 (not 8000)
#   postgres 5433 (not 5432)
#   redis    6380 (not 6379)
#   qdrant   6334 (not 6333)

name: engram-ci

services:
  engram:
    build: .
    ports:
      - "8100:4000"
    environment:
      DATABASE_URL: postgresql://engram:engram@postgres:5432/engram
      OLLAMA_URL: http://10.0.20.214:11434
      QDRANT_URL: http://qdrant:6333
      EMBED_MODEL: nomic-embed-text
      EMBED_DIMS: "768"
      EMBED_BACKEND: ollama
      COLLECTION: ci_test_notes
      JWT_SECRET: ci-test-secret-not-for-production
      REGISTRATION_ENABLED: "true"
      LOG_LEVEL: WARNING
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_RPM: "120"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
      POSTGRES_DB: engram
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: "no"

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: "no"

  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6334:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      start_period: 5s
      interval: 3s
      timeout: 3s
      retries: 10
    restart: "no"
