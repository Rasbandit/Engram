# Ephemeral CI test stack — all services local except Ollama (GPU on FastRaid).
#
# Always invoke with explicit project name for stable container names:
#   docker compose -f docker-compose.ci.yml -p engram-ci up -d --build --wait
#   python3 -m pytest e2e/tests/ -v  # E2E tests run against this stack
#   docker compose -f docker-compose.ci.yml -p engram-ci down -v --remove-orphans
#
# Container names: engram-ci-engram-1, engram-ci-postgres-1, etc.
#
# Ports offset from defaults to avoid collisions with local dev:
#   engram   8100 (not 4000)
#   postgres 5433 (not 5432)
#   qdrant   6334 (not 6333)

name: engram-ci

services:
  engram:
    build:
      context: .
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
        NODE_IMAGE: ${LOCAL_REGISTRY:-docker.io}/node:20-slim
        BUILDER_IMAGE: ${LOCAL_REGISTRY:-docker.io}/hexpm/elixir:1.17.3-erlang-27.1.2-debian-bookworm-20241202-slim
        RUNNER_IMAGE: ${LOCAL_REGISTRY:-docker.io}/debian:bookworm-20241202-slim
    ports:
      - "8100:4000"
    environment:
      SECRET_KEY_BASE: "ci-test-secret-base-not-for-production-at-least-64-bytes-long-enough-for-phoenix"
      DATABASE_URL: postgresql://engram:engram@postgres:5432/engram
      JWT_SECRET: ci-test-secret-not-for-production
      PHX_SERVER: "true"
      OLLAMA_URL: http://10.0.20.214:11434
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ci_test_notes
      EMBED_MODEL: nomic-embed-text
      EMBED_DIMS: "768"
      EMBED_BACKEND: ollama
      RERANKER_BACKEND: jina
      JINA_URL: http://10.0.20.214:8082
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
      CLERK_ISSUER: ${CLERK_ISSUER:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/api/health || exit 1"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: "no"

  postgres:
    image: ${LOCAL_REGISTRY:-docker.io}/postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
      POSTGRES_DB: engram
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: "no"

  qdrant:
    image: ${LOCAL_REGISTRY:-docker.io}/qdrant/qdrant:v1.17.1
    ports:
      - "6334:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      start_period: 5s
      interval: 3s
      timeout: 3s
      retries: 10
    restart: "no"
