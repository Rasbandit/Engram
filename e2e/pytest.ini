[pytest]
asyncio_mode = auto
timeout = 180
testpaths = tests
reruns = 1
reruns_delay = 2

# ── Logging ──────────────────────────────────────────────────────────────
# Show WARNING+ in terminal during test runs (keeps output readable)
log_cli = true
log_cli_level = WARNING

# Capture ALL logging (DEBUG+) to file for post-mortem analysis
log_file = pytest-e2e.log
log_file_level = DEBUG
log_file_format = %(asctime)s %(levelname)-8s %(name)s: %(message)s
log_file_date_format = %H:%M:%S
