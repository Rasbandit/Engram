[pytest]
asyncio_mode = auto
timeout = 180
testpaths = tests
reruns = 1
reruns_delay = 2
# -ra = show short summary for (a)ll non-passing outcomes, including reruns.
# Without this, rerun tracebacks never appear in CI logs, making flakes
# impossible to diagnose post-hoc.
addopts = -ra

# ── Logging ──────────────────────────────────────────────────────────────
# log_cli is OFF by default — stdout flushing per log line adds latency
# across a long serial suite. Enable with `-o log_cli=true` when debugging
# locally; CI still captures DEBUG+ to pytest-e2e.log for post-mortem.

# Capture ALL logging (DEBUG+) to file for post-mortem analysis
log_file = pytest-e2e.log
log_file_level = DEBUG
log_file_format = %(asctime)s %(levelname)-8s %(name)s: %(message)s
log_file_date_format = %H:%M:%S
