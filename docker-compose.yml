services:
  brain-indexer:
    build: ./indexer
    env_file: .env
    volumes:
      - "/home/open-claw/Obsidian Vault:/vault:ro"
      - indexer_state:/state
    restart: unless-stopped

  brain-api:
    build: ./api
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  indexer_state:
