services:
  brain-api:
    image: ${BRAIN_IMAGE:-brain-api}:${VERSION:-latest}
    container_name: brain-api
    ports:
      - "8000:8000"
    environment:
      TZ: ${TZ:-UTC}
      EMBED_MODEL: nomic-embed-text
      EMBED_BACKEND: ollama
      DATABASE_URL: postgresql://brain:brain@brain-postgres:5432/brain
      JWT_SECRET: ${JWT_SECRET}
      REGISTRATION_ENABLED: "true"
      OLLAMA_URL: http://ollama:11434
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      JINA_URL: ${JINA_URL:-http://jina-reranker:8082}
      COLLECTION: obsidian_notes
      LOG_LEVEL: INFO
      REDIS_URL: redis://brain-redis:6379/0
    logging:
      options:
        max-size: "50m"
        max-file: "1"
    depends_on:
      brain-postgres:
        condition: service_healthy
      brain-redis:
        condition: service_healthy
    restart: unless-stopped

  brain-redis:
    image: redis:7-alpine
    container_name: brain-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "50m"
        max-file: "1"
    restart: unless-stopped

  brain-postgres:
    image: postgres:16-alpine
    container_name: brain-postgres
    volumes:
      - brain_pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain
      POSTGRES_DB: brain
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "50m"
        max-file: "1"
    restart: unless-stopped

networks:
  default:
    name: ai
    external: true

volumes:
  brain_pg_data:
    external: true
