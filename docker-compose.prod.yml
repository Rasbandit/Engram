services:
  engram:
    image: ${ENGRAM_IMAGE:-engram}:${VERSION:-latest}
    container_name: engram
    ports:
      - "8000:8000"
    environment:
      TZ: ${TZ:-UTC}
      EMBED_MODEL: nomic-embed-text
      EMBED_BACKEND: ollama
      DATABASE_URL: postgresql://engram:engram@engram-postgres:5432/engram
      JWT_SECRET: ${JWT_SECRET}
      REGISTRATION_ENABLED: "true"
      OLLAMA_URL: http://ollama:11434
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      JINA_URL: ${JINA_URL:-http://jina-reranker:8082}
      COLLECTION: obsidian_notes
      LOG_LEVEL: INFO
      REDIS_URL: redis://engram-redis:6379/0
    logging:
      options:
        max-size: "50m"
        max-file: "1"
    depends_on:
      engram-postgres:
        condition: service_healthy
      engram-redis:
        condition: service_healthy
    restart: unless-stopped

  engram-redis:
    image: redis:7-alpine
    container_name: engram-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "50m"
        max-file: "1"
    restart: unless-stopped

  engram-postgres:
    image: postgres:16-alpine
    container_name: engram-postgres
    volumes:
      - engram_pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
      POSTGRES_DB: engram
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "50m"
        max-file: "1"
    restart: unless-stopped

networks:
  default:
    name: ai
    external: true

volumes:
  engram_pg_data:
    external: true
